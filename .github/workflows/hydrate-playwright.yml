name: Hydrate Playwright

on:
  push:
    branches:
      - feature/foundation-domain

jobs:
  dependency:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/foundation-domain
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --save-dev @playwright/test --workspace @orbe/desktop
      - shell: pwsh
        run: |
          New-Item -ItemType Directory -Path bundle/node_modules -Force | Out-Null
          Copy-Item package-lock.json bundle/package-lock.json
          New-Item -ItemType Directory -Path bundle/apps/desktop -Force | Out-Null
          Copy-Item apps/desktop/package.json bundle/apps/desktop/package.json
          Copy-Item node_modules/@playwright bundle/node_modules/@playwright -Recurse
          Copy-Item node_modules/playwright bundle/node_modules/playwright -Recurse
          Copy-Item node_modules/playwright-core bundle/node_modules/playwright-core -Recurse
      - uses: actions/upload-artifact@v4
        with:
          name: playwright-dependency-bundle
          path: bundle
          if-no-files-found: error
