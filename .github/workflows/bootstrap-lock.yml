name: Bootstrap npm lockfile

on:
  push:
    branches:
      - feature/foundation-domain

permissions:
  contents: write

jobs:
  lockfile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/foundation-domain
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install declared development tools
        run: npm install --save-dev typescript vitest eslint @eslint/js typescript-eslint dependency-cruiser fast-check
      - name: Validate generated workspace
        run: |
          npm ls --depth=0
          npm run lint
          npm run typecheck
          npm test
          npm run build
          npm run boundaries
      - name: Commit reproducible lockfile
        shell: bash
        run: |
          rm .github/workflows/bootstrap-lock.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json .github/workflows/bootstrap-lock.yml
          git commit -m "build: lock bootstrap dependencies"
          git push origin HEAD:feature/foundation-domain
