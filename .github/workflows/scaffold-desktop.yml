name: Scaffold desktop bundle

on:
  push:
    branches:
      - feature/foundation-domain

jobs:
  scaffold:
    runs-on: windows-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/foundation-domain
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Generate Tauri app
        run: npm create tauri-app@latest apps/desktop -- --template react-ts --manager npm --identifier app.orbe.desktop
      - name: Configure workspace package
        shell: pwsh
        run: |
          npm pkg set name=@orbe/desktop private=true --prefix apps/desktop
          npm pkg set scripts.test="vitest run" scripts.test:e2e="playwright test" scripts.typecheck="tsc --noEmit" scripts.tauri="tauri" scripts.tauri:build="tauri build" --prefix apps/desktop
          npm install
          npm install uuid --workspace @orbe/desktop
          npm install --save-dev @testing-library/react @testing-library/jest-dom @testing-library/user-event jsdom --workspace @orbe/desktop
      - name: Stage scaffold bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path desktop-bundle/apps -Force | Out-Null
          Copy-Item apps/desktop desktop-bundle/apps/desktop -Recurse
          if (Test-Path desktop-bundle/apps/desktop/node_modules) { Remove-Item desktop-bundle/apps/desktop/node_modules -Recurse -Force }
          Copy-Item package-lock.json desktop-bundle/package-lock.json
          Copy-Item node_modules desktop-bundle/node_modules -Recurse
      - name: Upload scaffold bundle
        uses: actions/upload-artifact@v4
        with:
          name: desktop-scaffold-bundle
          path: desktop-bundle
          include-hidden-files: true
          if-no-files-found: error
