name: Hydrate Task 6 Rust dependencies

on:
  push:
    paths:
      - ".github/workflows/hydrate-task6-rust.yml"

jobs:
  hydrate:
    runs-on: windows-latest
    env:
      CARGO_HOME: ${{ github.workspace }}\.cargo-hydrate
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Resolve Task 6 crates
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .cargo-hydrate | Out-Null
          New-Item -ItemType Directory -Force .task6-hydrate | Out-Null
          Push-Location .task6-hydrate
          cargo init --lib --name orbe_task6_hydrate
          cargo add rusqlite@0.32.1 --features bundled-sqlcipher-vendored-openssl
          cargo add keyring secrecy serde serde_json thiserror rand hex
          cargo add uuid@1.23.4 --features v7,serde
          cargo add tempfile@3.27.0 --dev
          cargo fetch
          Pop-Location
      - uses: actions/upload-artifact@v4
        with:
          name: task6-cargo-home
          path: .cargo-hydrate
          include-hidden-files: true
          retention-days: 1
